<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; }

/* Holds a black field. */
body { margin: 0; background: #000; color: #fff; font: 400 14px/1.6 'IBM Plex Mono', monospace; }

/* Pins an unobtrusive bar at the top. */
.bar { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #000; border-bottom: 1px solid #333; }

/* Reserves the center for the selector and pushes the steppers to the sides. */
.field { position: relative; flex: 1; max-width: 360px; margin: 0 auto; }

/* Frames the controls identically. */
input, .step { background: transparent; color: #fff; border: 1px solid #fff; font: inherit; letter-spacing: 0.02em; outline: none; }
input { width: 100%; padding: 9px 12px; }
input::placeholder { color: #666; }
.step { padding: 9px 12px; cursor: pointer; }
.step:hover { background: #fff; color: #000; }
.step:disabled { color: #444; border-color: #444; cursor: default; }

/* Overlays the menu below the selector without shifting the layout. */
.menu { position: absolute; left: 0; right: 0; top: calc(100% - 1px); border: 1px solid #fff; background: #000; list-style: none; margin: 0; padding: 0; max-height: 260px; overflow-y: auto; display: none; }
.menu.open { display: block; }
.menu li { padding: 10px 12px; cursor: pointer; }
.menu li + li { border-top: 1px solid #222; }
.menu li:hover, .menu li.on { background: #fff; color: #000; }

/* Reads as a centered document column. */
.content { max-width: 720px; margin: 0 auto; padding: 48px 24px 96px; }
.content h1 { font-size: 1.6rem; font-weight: 500; margin: 0 0 1.2rem; }
.content h2 { font-size: 1.15rem; font-weight: 500; margin: 2rem 0 0.8rem; border-bottom: 1px solid #333; padding-bottom: 0.4rem; }
.content h3 { font-size: 1rem; font-weight: 500; margin: 1.6rem 0 0.6rem; }
.content p { margin: 0.8rem 0; }
.content ul, .content ol { padding-left: 1.4rem; margin: 0.8rem 0; }
.content li { margin: 0.3rem 0; }
.content code { background: #1a1a1a; padding: 2px 5px; font-size: 0.9em; }
.content pre { background: #111; border: 1px solid #333; padding: 14px; overflow-x: auto; }
.content pre code { background: none; padding: 0; }
.content blockquote { border-left: 2px solid #333; margin: 0.8rem 0; padding-left: 14px; color: #aaa; }
.content hr { border: 0; border-top: 1px solid #333; margin: 2rem 0; }
</style>
</head>
<body>

<div class="bar">
  <button class="step" id="prev">prev</button>
  <div class="field" id="field">
    <input id="name" placeholder="note" autocomplete="off">
    <ul class="menu" id="menu"></ul>
  </div>
  <button class="step" id="next">next</button>
</div>

<article class="content" id="content"></article>

<!-- Notes data: NOTES = [{ name, md }]. A script src loads on file:// where fetch does not. -->
<script src="eng102notes.notes.js"></script>

<script>
// Escapes the characters that have meaning in HTML.
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// Renders inline spans: code, then bold, then italic.
function inline(s) {
  s = escapeHtml(s);
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  return s;
}

// Translates basic markdown to HTML. Blank lines split blocks; single breaks stay as line breaks.
function renderMarkdown(src) {
  const lines = src.replace(/\r\n/g, "\n").split("\n");
  const out = [];
  let para = [];
  let i = 0;

  // Emits the buffered lines as one paragraph.
  function flush() {
    if (para.length) { out.push("<p>" + para.map(inline).join("<br>") + "</p>"); para = []; }
  }

  while (i < lines.length) {
    const t = lines[i].trim();

    // Blank line ends the current block.
    if (t === "") { flush(); i++; continue; }

    // Horizontal rule.
    if (/^-{3,}$/.test(t)) { flush(); out.push("<hr>"); i++; continue; }

    // Heading, level set by the count of leading hashes.
    const h = /^(#{1,6})\s+(.*)$/.exec(t);
    if (h) { flush(); const n = h[1].length; out.push("<h" + n + ">" + inline(h[2]) + "</h" + n + ">"); i++; continue; }

    // Unordered list.
    if (/^[-*]\s+/.test(t)) {
      flush();
      const buf = [];
      while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) { buf.push(lines[i].trim().replace(/^[-*]\s+/, "")); i++; }
      out.push("<ul>" + buf.map(x => "<li>" + inline(x) + "</li>").join("") + "</ul>");
      continue;
    }

    // Ordered list.
    if (/^\d+\.\s+/.test(t)) {
      flush();
      const buf = [];
      while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) { buf.push(lines[i].trim().replace(/^\d+\.\s+/, "")); i++; }
      out.push("<ol>" + buf.map(x => "<li>" + inline(x) + "</li>").join("") + "</ol>");
      continue;
    }

    // Any other line is paragraph text.
    para.push(t);
    i++;
  }
  flush();
  return out.join("\n");
}

const field = document.getElementById("field");
const name = document.getElementById("name");
const menu = document.getElementById("menu");
const prev = document.getElementById("prev");
const next = document.getElementById("next");
const content = document.getElementById("content");

// Index of the note on screen.
let current = 0;

// Opens the dropdown.
function open() { menu.classList.add("open"); }

// Closes the dropdown.
function close() { menu.classList.remove("open"); }

// Draws the notes whose name contains the current filter text.
function render() {
  const q = name.value.trim().toLowerCase();
  menu.replaceChildren();
  NOTES.forEach((n, i) => {
    if (!n.name.toLowerCase().includes(q)) return;
    const li = document.createElement("li");
    li.textContent = n.name;
    if (i === current) li.className = "on";
    // Loads this note and closes the dropdown.
    li.addEventListener("click", () => { close(); load(i); });
    menu.appendChild(li);
  });
}

// Renders a note's markdown and updates the controls.
function load(i) {
  current = i;
  name.value = NOTES[i].name;
  prev.disabled = i === 0;
  next.disabled = i === NOTES.length - 1;
  content.innerHTML = renderMarkdown(NOTES[i].md);
  scrollTo(0, 0);
}

// Opens the dropdown on focus and shows every note.
name.addEventListener("focus", () => { name.value = ""; open(); render(); });

// Filters as the name changes.
name.addEventListener("input", () => { open(); render(); });

// Restores the current name when focus leaves without a choice.
name.addEventListener("blur", () => { setTimeout(() => { name.value = NOTES[current].name; }, 120); });

// Closes the dropdown when the pointer falls outside the selector.
document.addEventListener("click", (e) => { if (!field.contains(e.target)) close(); });

// Steps through the notes in order.
prev.addEventListener("click", () => { if (current > 0) load(current - 1); });
next.addEventListener("click", () => { if (current < NOTES.length - 1) load(current + 1); });

// Starts at the first note.
load(0);
</script>

</body>
</html>
