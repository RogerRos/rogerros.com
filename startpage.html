<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ROGERROS</title>
  <link rel="icon" type="image/svg+xml" href="favicon-unlocked.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #333;
      --muted2: #555;
      --stroke2: #3a3a3a;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --display: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      overflow: hidden;
    }

    body.menu-open { overflow: hidden; }

    /* ═══════════════════════════════════════════════════════ */
    /* MAIN PAGE */
    /* ═══════════════════════════════════════════════════════ */

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .main-text {
      font-family: var(--display);
      font-size: clamp(28px, 6vw, 72px);
      font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.1;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    .main-text:hover {
      opacity: 0.7;
    }

    .main-text:active {
      opacity: 0.5;
    }

    .main-text .key {
      display: inline-block;
      border: 3px solid var(--fg);
      padding: 0 0.15em;
      margin: 0 0.05em;
      line-height: 1;
    }

    .logout-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 12px 16px;
      border: 2px solid var(--muted);
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover {
      border-color: #ff3333;
      color: #ff3333;
    }

    .footer {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: lowercase;
    }

    .click-btn {
      margin-top: 30px;
      padding: 14px 24px;
      border: 2px solid var(--muted);
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: lowercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .click-btn:hover {
      border-color: var(--fg);
      color: var(--fg);
    }

    /* ═══════════════════════════════════════════════════════ */
    /* MENU OVERLAY */
    /* ═══════════════════════════════════════════════════════ */

    .menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .menu-overlay.is-open { display: block; }

    .menu-grid {
      position: absolute;
      inset: 0;
      opacity: 0.22;
      background-image:
        linear-gradient(to right, rgba(230,230,230,.07) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(230,230,230,.07) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }

    .menu-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .path-base {
      fill: none;
      stroke: rgba(230,230,230,.12);
      stroke-width: 2;
      transition: opacity 0.3s ease;
    }

    .path-active {
      fill: none;
      stroke: rgba(230,230,230,.4);
      stroke-width: 2;
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
    }

    .path-active.drawing {
      animation: drawPath 520ms ease forwards;
    }

    .path-active.highlight {
      stroke-dashoffset: 0;
      opacity: 1;
    }

    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }

    .menu-node {
      position: absolute;
      transform: translate(-50%, -50%);
      min-width: 150px;
      height: 54px;
      border: 2px solid var(--fg);
      background: rgba(0,0,0,.95);
      color: var(--fg);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      cursor: pointer;
      user-select: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 12px;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
      transition: 
        left 0.5s cubic-bezier(0.25, 0.1, 0.25, 1),
        top 0.5s cubic-bezier(0.25, 0.1, 0.25, 1),
        opacity 0.35s ease,
        background 0.15s ease,
        color 0.15s ease;
    }

    .menu-node.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .menu-node.moving {
      z-index: 10;
      transition: 
        left 0.55s cubic-bezier(0.25, 0.1, 0.25, 1),
        top 0.55s cubic-bezier(0.25, 0.1, 0.25, 1),
        opacity 0.35s ease;
    }

    .menu-node.fading {
      opacity: 0;
      pointer-events: none;
    }

    .menu-node:hover {
      background: rgba(230,230,230,.95);
      color: #000;
    }

    .menu-node:active {
      transform: translate(-50%, -50%) translateY(1px);
    }

    .menu-node .label { white-space: nowrap; }

    .menu-node .key {
      padding: 4px 8px;
      border: 2px solid var(--stroke2);
      font-size: 10px;
      color: #888;
      background: rgba(0,0,0,.4);
    }

    .menu-node:hover .key {
      border-color: #000;
      color: #000;
      background: transparent;
    }

    .menu-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border: 2px solid var(--fg);
      background: rgba(0,0,0,.95);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
      display: grid;
      place-items: center;
      transition: background 0.15s, color 0.15s;
    }

    .menu-close:hover {
      background: rgba(230,230,230,.95);
      color: #000;
    }

    .menu-back {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 14px 18px;
      border: 2px solid var(--stroke2);
      background: rgba(0,0,0,.9);
      color: #888;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, border-color 0.15s, color 0.15s;
    }

    .menu-back.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .menu-back:hover {
      border-color: var(--fg);
      color: var(--fg);
    }

    .menu-breadcrumb {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 10px;
      letter-spacing: 1px;
      color: #888;
      text-transform: uppercase;
      z-index: 100;
    }

    .menu-hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--stroke2);
      text-transform: uppercase;
      z-index: 100;
    }
  </style>
</head>
<body>
  <!-- Main page content -->
  <div class="container">
    <div class="main-text" id="mainText">
      Press <span class="key">M</span> to open menu
    </div>
    <button class="click-btn" id="clickBtn">or click here</button>
  </div>
  <button class="logout-btn" id="logoutBtn">Logout</button>
  <div class="footer">rogerros.com</div>

  <!-- Menu overlay -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-grid"></div>
    <svg class="menu-svg" id="menuSvg"></svg>
    <button class="menu-close" id="menuClose">✕</button>
    <button class="menu-back" id="menuBack">← Back</button>
    <div class="menu-breadcrumb" id="menuBreadcrumb"></div>
    <div class="menu-hint">Esc to close</div>
  </div>

  <script>
    (function() {
      'use strict';

      // ═══════════════════════════════════════════════════════
      // SESSION CHECK
      // ═══════════════════════════════════════════════════════
      const PREFIX = '_x_';
      function getSession() {
        try {
          const d = localStorage.getItem(PREFIX + 's');
          return d ? JSON.parse(atob(d)) : null;
        } catch { return null; }
      }
      function clearSession() {
        localStorage.removeItem(PREFIX + 's');
      }

      const session = getSession();
      if (!session || Date.now() > session.e) {
        clearSession();
        window.location.replace('index.html');
      }

      // Logout button
      document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        clearSession();
        window.location.replace('index.html');
      });

      // Click button opens menu
      document.getElementById('clickBtn').addEventListener('click', () => {
        if (window.PCBMenu) window.PCBMenu.open();
      });

      // ═══════════════════════════════════════════════════════
      // MENU TREE
      // ═══════════════════════════════════════════════════════
      const TREE = {
        id: 'start',
        label: 'START/',
        key: 'Enter',
        href: 'startpage.html',
        children: [
          {
            id: 'info',
            label: 'INFO/',
            key: 'I',
            children: [
              { id: 'quotes', label: 'QUOTES', key: 'Q', href: 'quotes.html' },
              { id: 'contact', label: 'CONTACT', key: 'C', href: 'contact.html' },
              { id: 'bio', label: 'BIO', key: 'B', href: 'bio.html' },
              { id: 'notes', label: 'NOTES', key: 'N', href: 'notes.html' }
            ]
          },
          {
            id: 'tools',
            label: 'TOOLS/',
            key: 'T',
            children: [
              { id: 'calc', label: 'CALCULATOR', key: 'C', href: 'calculator.html' }
            ]
          },
          {
            id: 'files',
            label: 'FILES/',
            key: 'F',
            children: [
              { id: 'images', label: 'IMAGES', key: 'I', href: 'images.html' },
              { id: 'audio', label: 'AUDIO', key: 'A', href: 'audio.html' },
              { id: 'backup', label: 'BACKUP', key: 'B', href: 'backup.html' }
            ]
          },
          {
            id: 'status',
            label: 'STATUS/',
            key: 'S',
            children: [
              { id: 'aistatus', label: 'AISTATUS', key: 'A', href: 'aistatus.html' }
            ]
          }
        ]
      };

      // ═══════════════════════════════════════════════════════
      // STATE
      // ═══════════════════════════════════════════════════════
      let currentNode = TREE;
      let history = [];
      let nodeEls = [];
      let pathEls = [];
      let isAnimating = false;
      let isOpen = false;

      // ═══════════════════════════════════════════════════════
      // DOM
      // ═══════════════════════════════════════════════════════
      const overlay = document.getElementById('menuOverlay');
      const svg = document.getElementById('menuSvg');
      const closeBtn = document.getElementById('menuClose');
      const backBtn = document.getElementById('menuBack');
      const breadcrumb = document.getElementById('menuBreadcrumb');

      // ═══════════════════════════════════════════════════════
      // LAYOUT
      // ═══════════════════════════════════════════════════════
      function getCenter() {
        return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      }

      function getChildPositions(count) {
        const c = getCenter();
        const positions = [];
        const w = window.innerWidth;
        const h = window.innerHeight;

        const layouts = {
          1: [{ x: 0, y: -0.30 }],
          2: [{ x: -0.30, y: -0.15 }, { x: 0.30, y: -0.15 }],
          3: [{ x: -0.32, y: -0.22 }, { x: 0.32, y: -0.22 }, { x: 0, y: 0.30 }],
          4: [{ x: -0.32, y: -0.23 }, { x: 0.32, y: -0.23 }, { x: 0.32, y: 0.27 }, { x: -0.32, y: 0.27 }],
          5: [{ x: -0.32, y: -0.23 }, { x: 0.32, y: -0.23 }, { x: 0.36, y: 0.20 }, { x: 0, y: 0.35 }, { x: -0.36, y: 0.20 }]
        };

        const layout = layouts[Math.min(count, 5)] || layouts[5];

        for (let i = 0; i < count; i++) {
          const l = layout[i % layout.length];
          positions.push({
            x: c.x + l.x * w,
            y: c.y + l.y * h
          });
        }

        return positions;
      }

      // ═══════════════════════════════════════════════════════
      // PATH GENERATION
      // ═══════════════════════════════════════════════════════
      function generatePath(from, to) {
        const r = 20;
        let d = `M ${from.x} ${from.y}`;

        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (absDx < 5 && absDy < 5) {
          return d;
        }

        if (absDx > absDy) {
          const midX = from.x + dx * 0.5;
          const signX = dx > 0 ? 1 : -1;
          const signY = dy > 0 ? 1 : -1;

          if (absDy < r * 2) {
            d += ` L ${to.x} ${to.y}`;
          } else {
            d += ` L ${midX - r * signX} ${from.y}`;
            d += ` Q ${midX} ${from.y} ${midX} ${from.y + r * signY}`;
            d += ` L ${midX} ${to.y - r * signY}`;
            d += ` Q ${midX} ${to.y} ${midX + r * signX} ${to.y}`;
            d += ` L ${to.x} ${to.y}`;
          }
        } else {
          const midY = from.y + dy * 0.5;
          const signX = dx > 0 ? 1 : -1;
          const signY = dy > 0 ? 1 : -1;

          if (absDx < r * 2) {
            d += ` L ${to.x} ${to.y}`;
          } else {
            d += ` L ${from.x} ${midY - r * signY}`;
            d += ` Q ${from.x} ${midY} ${from.x + r * signX} ${midY}`;
            d += ` L ${to.x - r * signX} ${midY}`;
            d += ` Q ${to.x} ${midY} ${to.x} ${midY + r * signY}`;
            d += ` L ${to.x} ${to.y}`;
          }
        }

        return d;
      }

      // ═══════════════════════════════════════════════════════
      // CREATE ELEMENTS
      // ═══════════════════════════════════════════════════════
      function createNode(data, x, y, isCenter = false) {
        const el = document.createElement('div');
        el.className = 'menu-node' + (isCenter ? ' is-center' : '');
        el.dataset.id = data.id;
        el.style.left = x + 'px';
        el.style.top = y + 'px';

        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = data.label;
        el.appendChild(label);

        if (data.key) {
          const key = document.createElement('span');
          key.className = 'key';
          key.textContent = data.key;
          el.appendChild(key);
        }

        el.addEventListener('click', () => handleClick(data));
        el.addEventListener('mouseenter', () => highlightPath(data.id));
        el.addEventListener('mouseleave', unhighlightPaths);

        overlay.appendChild(el);
        return el;
      }

      function createPath(from, to, id) {
        const pathD = generatePath(from, to);

        const base = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        base.setAttribute('d', pathD);
        base.classList.add('path-base');
        svg.appendChild(base);

        const active = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        active.setAttribute('d', pathD);
        active.classList.add('path-active');
        active.dataset.target = id;
        svg.appendChild(active);

        return { base, active };
      }

      // ═══════════════════════════════════════════════════════
      // HIGHLIGHT
      // ═══════════════════════════════════════════════════════
      function highlightPath(id) {
        pathEls.forEach(p => {
          if (p.active.dataset.target === id) {
            p.active.classList.add('highlight');
          }
        });
      }

      function unhighlightPaths() {
        pathEls.forEach(p => {
          p.active.classList.remove('highlight');
        });
      }

      // ═══════════════════════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════════════════════
      function clearAll() {
        return new Promise(resolve => {
          if (nodeEls.length === 0 && pathEls.length === 0) {
            resolve();
            return;
          }

          nodeEls.forEach(n => n.el.classList.add('fading'));
          pathEls.forEach(p => {
            p.base.style.opacity = '0';
            p.active.style.opacity = '0';
          });

          setTimeout(() => {
            nodeEls.forEach(n => n.el.remove());
            pathEls.forEach(p => {
              p.base.remove();
              p.active.remove();
            });
            nodeEls = [];
            pathEls = [];
            resolve();
          }, 350);
        });
      }

      function render() {
        const c = getCenter();

        const centerEl = createNode(currentNode, c.x, c.y, true);
        nodeEls.push({ data: currentNode, el: centerEl });

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            centerEl.classList.add('visible');
          });
        });

        if (currentNode.children && currentNode.children.length > 0) {
          const positions = getChildPositions(currentNode.children.length);

          setTimeout(() => {
            currentNode.children.forEach((child, i) => {
              setTimeout(() => {
                const pos = positions[i];
                const path = createPath(c, pos, child.id);
                pathEls.push(path);

                requestAnimationFrame(() => {
                  path.active.classList.add('drawing');
                });

                setTimeout(() => {
                  const el = createNode(child, pos.x, pos.y);
                  nodeEls.push({ data: child, el });

                  requestAnimationFrame(() => {
                    el.classList.add('visible');
                  });
                }, 250);
              }, i * 100);
            });
          }, 200);
        }

        backBtn.classList.toggle('visible', history.length > 0);
        updateBreadcrumb();
      }

      function updateBreadcrumb() {
        const path = history.map(n => n.label.replace('/', '')).concat([currentNode.label.replace('/', '')]);
        breadcrumb.textContent = path.join(' → ');
      }

      // ═══════════════════════════════════════════════════════
      // NAVIGATION
      // ═══════════════════════════════════════════════════════
      function navigateInto(node) {
        if (isAnimating) return;
        isAnimating = true;

        const c = getCenter();
        const clickedEl = nodeEls.find(n => n.data.id === node.id)?.el;

        nodeEls.forEach(n => {
          if (n.data.id !== node.id) {
            n.el.classList.add('fading');
          }
        });

        pathEls.forEach(p => {
          p.base.style.opacity = '0';
          p.active.style.opacity = '0';
        });

        if (clickedEl) {
          clickedEl.classList.add('moving');
          clickedEl.style.left = c.x + 'px';
          clickedEl.style.top = c.y + 'px';
        }

        setTimeout(() => {
          nodeEls.forEach(n => n.el.remove());
          pathEls.forEach(p => {
            p.base.remove();
            p.active.remove();
          });
          nodeEls = [];
          pathEls = [];

          history.push(currentNode);
          currentNode = node;

          render();

          setTimeout(() => {
            isAnimating = false;
          }, 100);
        }, 550);
      }

      function navigateBack() {
        if (isAnimating || history.length === 0) return;
        isAnimating = true;

        clearAll().then(() => {
          currentNode = history.pop();
          render();
          setTimeout(() => {
            isAnimating = false;
          }, 100);
        });
      }

      function handleClick(node) {
        if (isAnimating) return;
        
        // Clicking center node with href navigates
        if (node === currentNode && node.href) {
          closeMenu();
          window.location.href = node.href;
          return;
        }
        
        if (node === currentNode) return;

        if (node.children) {
          navigateInto(node);
        } else if (node.href) {
          closeMenu();
          window.location.href = node.href;
        }
      }

      // ═══════════════════════════════════════════════════════
      // OPEN/CLOSE
      // ═══════════════════════════════════════════════════════
      function openMenu() {
        if (isOpen) return;
        isOpen = true;
        currentNode = TREE;
        history = [];
        overlay.classList.add('is-open');
        document.body.classList.add('menu-open');
        render();
      }

      function closeMenu() {
        if (!isOpen) return;
        isOpen = false;
        overlay.classList.remove('is-open');
        document.body.classList.remove('menu-open');
        clearAll();
      }

      function toggleMenu() {
        isOpen ? closeMenu() : openMenu();
      }

      // ═══════════════════════════════════════════════════════
      // EVENTS
      // ═══════════════════════════════════════════════════════
      closeBtn.addEventListener('click', closeMenu);
      backBtn.addEventListener('click', navigateBack);

      overlay.addEventListener('mousedown', (e) => {
        if (e.target === overlay) closeMenu();
      });

      function isTyping() {
        const el = document.activeElement;
        if (!el) return false;
        const tag = el.tagName.toLowerCase();
        return tag === 'input' || tag === 'textarea' || tag === 'select' || el.isContentEditable;
      }

      window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();

        if (key === 'm' && !e.ctrlKey && !e.metaKey && !e.altKey && !isTyping()) {
          e.preventDefault();
          toggleMenu();
          return;
        }

        if (!isOpen) return;

        if (key === 'escape') {
          e.preventDefault();
          closeMenu();
          return;
        }

        if (key === 'backspace') {
          e.preventDefault();
          navigateBack();
          return;
        }

        if (isAnimating) return;

        // Enter key goes to startpage
        if (e.key === 'Enter') {
          e.preventDefault();
          closeMenu();
          window.location.href = 'startpage.html';
          return;
        }

        if (currentNode.children) {
          const match = currentNode.children.find(c => c.key && c.key.toLowerCase() === key);
          if (match) {
            e.preventDefault();
            handleClick(match);
          }
        }
      });

      let resizeTimer;
      window.addEventListener('resize', () => {
        if (!isOpen || isAnimating) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          clearAll().then(() => render());
        }, 200);
      });

      // Global API
      window.PCBMenu = { open: openMenu, close: closeMenu, toggle: toggleMenu };
    })();
  </script>
</body>
</html>
