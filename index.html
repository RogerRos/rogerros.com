<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Was It Worth It?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .phrase {
    color: #9bbcff;
    font-size: clamp(0.95rem, 2.2vw, 1.4rem);
    font-weight: 200;
    letter-spacing: 0.09em;
    white-space: nowrap;
    user-select: none;
    line-height: 1;
    display: inline-flex;
    align-items: baseline;
  }
  .qmark {
    position: relative;
    display: inline-block;
    width: 0.42em;
    height: 1em;
    margin-left: 0.04em;
  }
  .hook {
    position: absolute;
    top: 0.06em;
    left: 0;
    width: 100%;
    height: 0.6em;
    overflow: visible;
  }
  .hook path {
    fill: none;
    stroke: #9bbcff;
    stroke-width: 6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .dot {
    position: absolute;
    left: 50%;
    top: 0.86em;
    width: 0.09em;
    height: 0.09em;
    background: #9bbcff;
    border-radius: 50%;
    transform: translate(-50%, 0) scale(0);
    opacity: 0;
    transform-origin: 50% 50%;
    animation: tear 7s infinite;
    will-change: transform, border-radius, opacity;
  }
  @keyframes tear {
    0% {
      transform: translate(-50%, 0) scale(0);
      border-radius: 50%;
      opacity: 0;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    10% {
      transform: translate(-50%, 0) scale(1);
      border-radius: 50%;
      opacity: 1;
      animation-timing-function: linear;
    }
    32% {
      transform: translate(-50%, 0) scale(1);
      border-radius: 50%;
      opacity: 1;
      animation-timing-function: ease-in-out;
    }
    44% {
      transform: translate(-50%, 0) scale(1.45);
      border-radius: 50%;
      opacity: 1;
      animation-timing-function: ease-in;
    }
    52% {
      transform: translate(-50%, 0.25em) scale(1.25, 1.85);
      border-radius: 50% 50% 50% 50% / 62% 62% 38% 38%;
      opacity: 1;
      animation-timing-function: cubic-bezier(0.45, 0, 1, 1);
    }
    84% {
      transform: translate(-50%, 110vh) scale(0.55, 2.05);
      border-radius: 50% 50% 50% 50% / 82% 82% 18% 18%;
      opacity: 0.95;
      animation-timing-function: ease-out;
    }
    88% {
      transform: translate(-50%, 110vh) scale(0.3, 1.5);
      border-radius: 50% 50% 50% 50% / 82% 82% 18% 18%;
      opacity: 0;
    }
    100% {
      transform: translate(-50%, 0) scale(0);
      border-radius: 50%;
      opacity: 0;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .dot {
      animation: none;
      transform: translate(-50%, 0) scale(1);
      opacity: 1;
    }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="phrase">
      <span>Was It Worth It</span><span class="qmark"><svg class="hook" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true"><path d="M22 38 C22 8, 78 8, 78 38 C78 64, 50 60, 50 92"/></svg><span class="dot" aria-hidden="true"></span></span>
    </div>
  </div>
</body>
</html>
